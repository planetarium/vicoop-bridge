name: Release Client

on:
  push:
    tags:
      - 'client-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client packages
        run: pnpm --filter @vicoop-bridge/protocol --filter @vicoop-bridge/client build

      - name: Package portable client bundle
        run: ./scripts/package-client-release.sh "${{ github.ref_name }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          files: |
            dist-release/vicoop-bridge-client-*.tgz
            dist-release/vicoop-bridge-client-*.tgz.sha256
          generate_release_notes: true
          body: |
            Portable `vicoop-bridge-client` bundle for direct GitHub download.

            Quick start:

            ```bash
            tar -xzf vicoop-bridge-client-<version>.tgz
            cd vicoop-bridge-client-<version>
            ./bin/vicoop-client --help
            ```
