name: Smoke Test Actions (temp)

# Temporary workflow for PR #50 to verify bumped action versions load on
# Node.js 24 runners without deprecation warnings. Remove before merge.

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/smoke-test-actions.yml'
      - '.github/workflows/release-client.yml'
      - '.github/workflows/deploy-server.yml'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client packages
        run: pnpm --filter @vicoop-bridge/protocol --filter @vicoop-bridge/client build

      - name: Package portable client bundle
        run: ./scripts/package-client-release.sh "client-vSMOKE"

      - name: Probe action-gh-release bundle (no publish)
        run: |
          ls -la dist-release/
          echo "softprops/action-gh-release@v3 dry check: files would be:"
          ls dist-release/vicoop-bridge-client-*.tgz*

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Show flyctl version
        run: flyctl version
